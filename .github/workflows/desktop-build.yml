name: Desktop Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  actions: write
  contents: write

defaults:
  run:
    shell: bash

env:
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

jobs:
  metadata:
    name: Build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      isRelease: ${{ steps.version.outputs.isRelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve app version
        id: version
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const desktopPackage = JSON.parse(fs.readFileSync("apps/desktop/package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("apps/desktop/src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/\[workspace\.package\][\s\S]*?^version\s*=\s*"([^"]+)"/m)?.[1];

          const versions = [
            ["apps/desktop/package.json", desktopPackage.version],
            ["apps/desktop/src-tauri/tauri.conf.json", tauriConfig.version],
            ["Cargo.toml [workspace.package]", cargoVersion],
          ];
          const missing = versions.filter(([, version]) => !version);
          if (missing.length) {
            console.error(`Missing version in: ${missing.map(([name]) => name).join(", ")}`);
            process.exit(1);
          }

          const unique = new Set(versions.map(([, version]) => version));
          if (unique.size !== 1) {
            console.error("Version mismatch:\n" + versions.map(([name, version]) => `- ${name}: ${version}`).join("\n"));
            process.exit(1);
          }

          const version = versions[0][1];
          if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
            console.error(`Version must be semver-like, got: ${version}`);
            process.exit(1);
          }

          const tag = `v${version}`;
          const isRelease = process.env.GITHUB_EVENT_NAME === "push" && process.env.GITHUB_REF === "refs/heads/main";
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `tag=${tag}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `isRelease=${isRelease}\n`);
          console.log(`Resolved Skill Library ${tag}; release=${isRelease}`);
          NODE

  build-desktop:
    name: ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            runner: macos-15-intel
            os: macos
            arch: x64
            rustTarget: x86_64-apple-darwin
          - name: macOS Apple Silicon
            runner: macos-15
            os: macos
            arch: arm64
            rustTarget: aarch64-apple-darwin
          - name: Windows x64
            runner: windows-2025
            os: windows
            arch: x64
            rustTarget: x86_64-pc-windows-msvc
          - name: Windows ARM64
            runner: windows-11-arm
            os: windows
            arch: arm64
            rustTarget: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rustTarget }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Check GitHub OAuth client id for release builds
        if: ${{ needs.metadata.outputs.isRelease == 'true' }}
        env:
          CLIENT_ID: ${{ vars.CLIENT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CLIENT_ID:-}" ]; then
            echo "::error::Set CLIENT_ID in repository Settings > Secrets and variables > Actions > Variables before publishing release builds. Environment variables are only available to jobs that declare an environment."
            exit 1
          fi

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLIENT_ID: ${{ vars.CLIENT_ID }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: --target ${{ matrix.rustTarget }}
          retryAttempts: 2
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: skill-library-v${{ needs.metadata.outputs.version }}-[platform]-[arch]-[bundle]

      - name: Package portable app (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          app_path="target/${{ matrix.rustTarget }}/release/bundle/macos/Skill Library.app"
          mkdir -p portable
          ditto -c -k --keepParent "$app_path" "portable/Skill-Library-v${{ needs.metadata.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}-portable.zip"

      - name: Package portable app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = "target/${{ matrix.rustTarget }}/release/skill-library-desktop.exe"
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Compress-Archive -Path $exe -DestinationPath "portable/Skill-Library-v${{ needs.metadata.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}-portable.zip" -Force

      - name: Upload portable workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: skill-library-v${{ needs.metadata.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}-portable
          path: portable/*.zip
          if-no-files-found: error

  publish-release:
    name: Create version tag and draft release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - build-desktop
    if: ${{ needs.metadata.outputs.isRelease == 'true' }}
    steps:
      - name: Check version tag availability
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::${TAG} already exists. Bump apps/desktop/package.json, apps/desktop/src-tauri/tauri.conf.json, and Cargo.toml before publishing."
            exit 1
          fi

      - name: Download workflow artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: skill-library-v${{ needs.metadata.outputs.version }}-*
          path: release-artifacts
          merge-multiple: false

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          while IFS= read -r -d '' file; do
            rel="${file#release-artifacts/}"
            artifact_name="${rel%%/*}"
            file_name="$(basename "$file")"
            cp "$file" "release-assets/${artifact_name}-${file_name}"
          done < <(find release-artifacts -type f -print0)

          mapfile -d '' files < <(find release-assets -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No build artifacts found for ${TAG}."
            exit 1
          fi
          gh release create "${TAG}" "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --draft \
            --title "Skill Library ${TAG}" \
            --generate-notes

  cleanup-packages:
    name: Cleanup old packages
    runs-on: ubuntu-latest
    needs:
      - build-desktop
      - publish-release
    if: ${{ always() && needs.build-desktop.result == 'success' && github.event_name != 'pull_request' && (needs.publish-release.result == 'success' || needs.publish-release.result == 'skipped') }}
    steps:
      - name: Keep last three release versions and artifact runs
        uses: actions/github-script@v9
        with:
          script: |
            const keepReleases = 3;
            const keepWorkflowRuns = 3;
            const artifactPrefix = "skill-library-";
            const workflowFile = "desktop-build.yml";
            const { owner, repo } = context.repo;

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const versionReleases = releases
              .filter((release) => /^v/.test(release.tag_name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            for (const release of versionReleases.slice(keepReleases)) {
              core.info(`Deleting old release assets by deleting release ${release.tag_name} (${release.id}); git tag is kept.`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: workflowFile,
              status: "completed",
              per_page: 100,
            });
            const successfulRuns = runs
              .filter((run) => run.conclusion === "success")
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const previousSuccessfulRuns = successfulRuns.filter((run) => run.id !== context.runId);
            const keepRunIds = new Set(previousSuccessfulRuns.slice(0, keepWorkflowRuns - 1).map((run) => run.id));
            keepRunIds.add(context.runId);

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });

            for (const artifact of artifacts) {
              if (!artifact.name.startsWith(artifactPrefix)) continue;
              const runId = artifact.workflow_run?.id;
              if (!runId || keepRunIds.has(runId)) continue;
              core.info(`Deleting old workflow artifact ${artifact.name} (${artifact.id}) from run ${runId}.`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
